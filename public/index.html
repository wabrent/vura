<!DOCTYPE html>
<html>
<head>
  <title>VURA</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
</head>
<body>
  <nav>
    <div class="logo">VURA</div>
    <div class="status"><span class="dot"></span>LIVE</div>
  </nav>

  <section class="hero">
    <h1>PREDICTION TERMINAL</h1>
    <p>Real-time intelligence for Polymarket</p>
  </section>

  <div class="tabs">
    <button onclick="setTab('all')">ALL</button>
    <button onclick="setTab('crypto')">CRYPTO</button>
    <button onclick="setTab('politics')">POLITICS</button>
    <button onclick="setTab('sports')">SPORTS</button>
  </div>

  <div class="layout">
    <main id="markets"></main>
    <aside>
      <div class="panel">
        <div class="panel-title">WHALE FLOW</div>
        <div id="whales"></div>
      </div>
    </aside>
  </div>

  <script src="app.js"></script>
</body>
</html>
