<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VURA | Cross-Platform Scanner</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box }
        body { background:#111; color:#eee; font-family:'Courier New',monospace; padding:20px }
        h1 { font-size:16px; margin-bottom:4px }
        .sub { color:#666; font-size:11px; margin-bottom:20px }
        .row { display:flex; align-items:center; gap:12px; padding:8px 12px; border:1px solid #222; margin-bottom:4px; background:#181818; font-size:11px }
        .row:hover { background:#1f1f1f }
        .q { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
        .src { color:#888; font-size:9px; min-width:30px }
        .price { min-width:40px; text-align:right; font-weight:bold }
        .diff { min-width:50px; text-align:right }
        .up { color:#00cc66 } .down { color:#ff4444 }
        .loading { text-align:center; color:#666; padding:40px }
        .error { text-align:center; color:#ff4444; padding:20px; font-size:11px }
        .header { color:#666; font-size:10px; border-bottom:1px solid #333; margin-bottom:8px }
        .header .price,.header .diff { font-weight:normal }
    </style>
</head>
<body>
<h1>VURA Scanner</h1>
<div class="sub" id="status">Loading Polymarket...</div>

<div class="row header">
    <span class="q">Market</span>
    <span class="src">PM</span>
    <span class="price">Price</span>
    <span class="src">MF</span>
    <span class="price">Price</span>
    <span class="diff">Δ%</span>
</div>

<div id="feed"><div class="loading">Connecting...</div></div>

<script>
const PM_API = '/api/proxy?url=' + encodeURIComponent('https://gamma-api.polymarket.com/events?closed=false&limit=30')
const MF_API = 'https://manifold.markets/api/v0/markets?limit=100&sort=liquidity'

let polyMarkets = []
let manifoldMarkets = []

function parsePrice(prices, idx) {
    if (!prices) return null
    const p = typeof prices === 'string' ? JSON.parse(prices) : prices
    return parseFloat(p[idx]) || null
}

function keywords(q) {
    return q.toLowerCase().split(/\s+/).filter(w => w.length > 3)
}

async function fetchPoly() {
    try {
        const r = await fetch(PM_API)
        const d = await r.json()
        polyMarkets = d.filter(e => e.active).map(e => {
            const m = (e.markets||[]).find(x => x.active && !x.closed) || (e.markets||[])[0] || {}
            const yes = parsePrice(m.outcomePrices, 0)
            const no = parsePrice(m.outcomePrices, 1)
            return {
                id: e.id, title: e.title||'', slug: e.slug||'',
                yes: yes, no: no,
                vol: m.volumeNum || m.volume || 0,
                words: keywords(e.title||'')
            }
        }).filter(m => m.yes !== null && m.no !== null && m.yes > 0.01 && m.yes < 0.99)
        document.getElementById('status').textContent = `Polymarket: ${polyMarkets.length} markets`
    } catch(e) {
        document.getElementById('status').textContent = 'Polymarket failed: ' + e.message
    }
}

async function fetchManifold() {
    try {
        // Try direct then proxy
        let r
        try { r = await fetch(MF_API) } catch(e) {
            r = await fetch('/api/proxy?url=' + encodeURIComponent(MF_API))
        }
        const d = await r.json()
        manifoldMarkets = (Array.isArray(d)?d:[]).filter(m =>
            m.outcomeType==='BINARY' && typeof m.probability==='number' && m.probability>0.01 && m.probability<0.99
        ).map(m => ({
            title: m.question, prob: m.probability, vol: m.volume||0,
            words: keywords(m.question)
        }))
        document.getElementById('status').textContent += ` | Manifold: ${manifoldMarkets.length} markets`
    } catch(e) { /* manifold optional */ }
}

function findMatch(pm) {
    let best = null, bestOverlap = 0
    for (const mm of manifoldMarkets) {
        const overlap = pm.words.filter(w => mm.words.includes(w)).length
        if (overlap > bestOverlap && overlap >= 2) {
            bestOverlap = overlap; best = mm
        }
    }
    return best
}

function render() {
    const feed = document.getElementById('feed')
    if (!polyMarkets.length) {
        feed.innerHTML = '<div class="loading">No Polymarket data yet</div>'
        return
    }

    const rows = polyMarkets.map(pm => {
        const mf = findMatch(pm)
        const pmPrice = Math.round(pm.yes * 100)
        const mfPrice = mf ? Math.round(mf.prob * 100) : null
        const diff = (mfPrice !== null) ? (pmPrice - mfPrice) : null
        const diffClass = diff !== null ? (diff > 0 ? 'up' : diff < 0 ? 'down' : '') : ''

        let mfCol = '<span class="src">-</span><span class="price">-</span>'
        if (mf) {
            mfCol = `<span class="src">MF</span><span class="price">${mfPrice}c</span>`
        }

        let diffCol = '<span class="diff">-</span>'
        if (diff !== null && Math.abs(diff) >= 2) {
            diffCol = `<span class="diff ${diffClass}">${diff>0?'+':''}${diff}c</span>`
        }

        return `<div class="row" onclick="window.open('https://polymarket.com/event/${pm.slug}','_blank')" style="cursor:pointer">
            <span class="q" title="${pm.title}">${pm.title}</span>
            <span class="src">PM</span>
            <span class="price">${pmPrice}c</span>
            ${mfCol}
            ${diffCol}
        </div>`
    }).join('')

    feed.innerHTML = rows
}

async function scan() {
    await Promise.all([fetchPoly(), fetchManifold()])
    render()
}

scan()
setInterval(scan, 30000)
</script>
</body>
</html>
